# Loaded into nginx's http{} context (conf.d/*.conf). Honors X-Forwarded-Proto
# from an upstream TLS terminator (Caddy); falls back to this server's own
# scheme for direct/internal requests (e.g. healthchecks over plain HTTP).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}
